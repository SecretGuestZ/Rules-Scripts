# ==========================================
# 混合定制版: MihomoPro (底层) + Mihomo Party (分组/规则)
# 适配客户端: ClashMac / Mihomo Party / 其它 Mihomo 内核客户端
# 2026/05/13    @SecretGuestZ
# ==========================================

# 1. 基础设置 (基于 Pro 版优化)
mode: rule
mixed-port: 7893
ipv6: false                 # macOS 环境下建议关闭以减少网络抖动
allow-lan: false            # 已按要求关闭，提升本机安全性
unified-delay: true
tcp-concurrent: true        # M3 芯片并行处理能力强，建议开启
log-level: warning
find-process-mode: 'always' # 精准识别 macOS 应用进程
global-client-fingerprint: chrome
# 针对 M3 芯片优化：允许 GSO 硬件加速以降低 CPU 占用
experimental:
  quic-go-disable-gso: false
  
# 2. 流量嗅探 (Pro 版核心: 解决域名分流不准的问题)
sniffer:
  enable: true
  sniff:
    HTTP: {ports: [80, 8080-8880], override-destination: true}
    TLS: {ports: [443, 8443]}
    QUIC: {ports: [443, 8443]}
  skip-domain:
    - '+.apple.com'          # 排除 Apple 服务防止推送异常
    - 'Mijia Cloud'

# 3. DNS 设置 (Pro 版核心: 极致秒开体验)
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # 新增：防止 macOS 验证网络和内网域名被劫持
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '+.apple.com'         # 配合 sniffer 的 skip-domain，避免 Apple 服务异常
    - 'captive.apple.com'   # 解决公共 Wi-Fi 登录页面弹不出的问题
    - 'stun.*.*'            # 避开 P2P 穿透的节点
  # 新增：用于解析 DoH 域名（doh.pub）以及节点订阅域名的基础 DNS
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

# 4. TUN 模式设置 (适合 Mac 全局代理)
tun:
  enable: true
  stack: system             # macOS Tahoe 建议使用系统协议栈
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true   # 自动适应 MacBook 切换 WiFi

# 5. 节点提供者 (请在此处粘贴你的机场订阅链接)
proxy-providers:
  SSRDOG:
    type: http
    url: "你的订阅链接"   # <------------------------ 修改这里
    interval: 86400
    path: ./proxies/airport.yaml
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 900

# 6. 分流分组 (完全采用 Party 版写法)
