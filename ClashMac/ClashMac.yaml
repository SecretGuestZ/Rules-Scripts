  - {name: YouTube,  type: fallback, url: "https://www.youtube.com/generate_204", interval: 900, proxies: [美国节点, 韩国节点, 日本节点, 英国节点, 加拿大节点, 新加坡节点, 台湾节点],         icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/YouTube.png            }
