  - {name: 台湾节点,   type: url-test, include-all: true, interval: 900, tolerance: 50,  filter: "台|湾|TW|(?i)Taiwan",         icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png         }
