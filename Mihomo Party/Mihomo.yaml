proxy-groups:
#分流分组
  - {name: 手动切换,  type: select, include-all: true,                                                                                                                                          icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Static.png            }
  - {name: AI,       type: fallback, url: https://generativelanguage.googleapis.com,     interval: 900, proxies: [美国节点, 新加坡节点, 日本节点, 韩国节点, 英国节点, 加拿大节点, 台湾节点],         icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/OpenAI.png             }
  - {name: Google,   type: fallback, url: https://www.google.com/generate_204,           interval: 900, proxies: [美国节点, 新加坡节点, 日本节点, 韩国节点, 英国节点, 加拿大节点, 台湾节点],         icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Google.png             } 
  - {name: YouTube,  type: fallback, url: https://www.youtube.com/generate_204,          interval: 900, proxies: [美国节点, 新加坡节点, 日本节点, 韩国节点, 英国节点, 加拿大节点, 台湾节点],         icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/YouTube.png            }
  - {name: X,        type: fallback, url: https://abs.twimg.com/generate_204,            interval: 900, proxies: [香港节点, 新加坡节点, 日本节点, 韩国节点, 美国节点, 英国节点, 加拿大节点, 台湾节点],icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/X.png        }
  - {name: Telegram, type: fallback, url: https://t.me/favicon.ico,                      interval: 900, proxies: [香港节点, 新加坡节点, 日本节点, 韩国节点, 美国节点, 英国节点, 加拿大节点, 台湾节点],icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Telegram.png           }
  - {name: Github,   type: fallback, url: https://raw.githubusercontent.com/favicon.ico, interval: 900, proxies: [香港节点, 新加坡节点, 日本节点, 韩国节点, 美国节点, 英国节点, 加拿大节点, 台湾节点],icon: https://raw.githubusercontent.com/Orz-3/mini/master/Alpha/github.png             }
  - {name: Facebook, type: fallback, url: https://www.facebook.com/favicon.ico,          interval: 900, proxies: [香港节点, 新加坡节点, 日本节点, 韩国节点, 美国节点, 英国节点, 加拿大节点, 台湾节点],icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Facebook.png }
  - {name: 全球加速,  type: select,                                                                      proxies: [手动切换, 自动选择, 香港节点, 日本节点, 台湾节点, 美国节点, 新加坡节点, 韩国节点, 加拿大节点, 英国节点],icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Global.png             }
  - {name: 兜底分流,  type: select,                                                                      proxies: [手动切换, 自动选择, 香港节点, 日本节点, 台湾节点, 美国节点, 新加坡节点, 韩国节点, 加拿大节点, 英国节点],icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Final.png              }
  
#节点分组
  - {name: 自动选择,   type: url-test, include-all: true, interval: 900, tolerance: 60,                                         icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Urltest.png                  }
  - {name: 香港节点,   type: url-test, include-all: true, interval: 900, tolerance: 60,  filter: "港|HK|(?i)Hong",              icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png      }             
  - {name: 日本节点,   type: url-test, include-all: true, interval: 900, tolerance: 60,  filter: "日|东京|JP|(?i)Japan",        icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png          }
  - {name: 台湾节点,   type: url-test, include-all: true, interval: 900, tolerance: 60,  filter: "台|湾|TW|(?i)Taiwan",         icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png         }
  - {name: 美国节点,   type: url-test, include-all: true, interval: 900, tolerance: 60,  filter: "美|US|(?i)States|America",    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png  }
  - {name: 新加坡节点, type: url-test, include-all: true, interval: 900, tolerance: 60,  filter: "新|坡|SG|(?i)Singapore",      icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png      }
  - {name: 韩国节点,   type: url-test, include-all: true, interval: 900, tolerance: 60,  filter: "韩|KR|(?i)Korea",             icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Korea.png          }
  - {name: 加拿大节点, type: url-test, include-all: true, interval: 900, tolerance: 60,  filter: "加|拿大|CA|(?i)Canada",        icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Canada.png         }
  - {name: 英国节点,   type: url-test, include-all: true, interval: 900, tolerance: 60,  filter: "英|GB|(?i)England|Britain",   icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_Kingdom.png }

# 分流规则 
rule-providers:
  Lan:      {behavior: classical, interval: 86400, format: yaml, type: http, url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.yaml ,               path: ./ruleset/Lan.yaml          }
  Direct:   {behavior: classical, interval: 86400, format: yaml, type: http, url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Direct/Direct.yaml ,         path: ./ruleset/Direct.yaml       }
  AdBlock:  {behavior: domain, interval: 86400, format: mrs, type: http, url: https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.mrs ,         path: ./ruleset/AdBlock.mrs       }
  AI:       {behavior: classical, interval: 86400, format: yaml, type: http, url: https://raw.githubusercontent.com/SecretGuestZ/Rules-Scripts/main/Resource/Rules/AI.yaml ,                    path: ./ruleset/AI.yaml      }
  Google:   {behavior: domain, interval: 86400, format: mrs, type: http, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs ,         path: ./ruleset/Google.mrs       }
  YouTube:  {behavior: domain, interval: 86400, format: mrs, type: http, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs ,         path: ./ruleset/YouTube.mrs       }
  X:        {behavior: domain, interval: 86400, format: mrs, type: http, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/x.mrs ,         path: ./ruleset/X.mrs       }
  Telegram: {behavior: ipcidr, interval: 86400, format: mrs, type: http, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/telegram.mrs ,         path: ./ruleset/Telegram.mrs       }
  Github:   {behavior: domain, interval: 86400, format: mrs, type: http, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs ,         path: ./ruleset/GitHub.mrs       }
  Facebook: {behavior: domain, interval: 86400, format: mrs, type: http, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/facebook.mrs ,         path: ./ruleset/Facebook.mrs       }
  Proxy:    {behavior: domain, interval: 86400, format: mrs, type: http, url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/proxy.mrs ,         path: ./ruleset/Proxy.mrs       }
   
# 分流Policy 
rules:
  - RULE-SET,Lan, DIRECT
  - RULE-SET,Direct, DIRECT
  - RULE-SET,AdBlock, REJECT
  - RULE-SET,AI, AI
  - RULE-SET,Google, Google
  - RULE-SET,YouTube, YouTube
  - RULE-SET,X, X
  - RULE-SET,Telegram, Telegram
  - RULE-SET,Github, Github
  - RULE-SET,Facebook, Facebook
  - RULE-SET,ProxyLite, 全球加速
  - GEOIP,CN, DIRECT
  - MATCH, 兜底分流
